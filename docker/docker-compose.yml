version: '3.8'

services:
  # MinIO Object Storage
  minio:
    build:
      context: .
      dockerfile: minio.Dockerfile
    container_name: 3d-recon-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - 3d-recon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # MongoDB (for job storage)
  mongodb:
    image: mongo:7
    container_name: 3d-recon-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: reconstruction
    volumes:
      - mongodb-data:/data/db
    networks:
      - 3d-recon-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis (for Celery task queue)
  redis:
    image: redis:7-alpine
    container_name: 3d-recon-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - 3d-recon-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: 3d-recon-backend
    ports:
      - "8000:8000"
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../backend:/app/backend
      - ../configs:/app/configs
    networks:
      - 3d-recon-network
    depends_on:
      - minio
      - redis
    command: uvicorn backend.api.server:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: 3d-recon-celery
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../backend:/app/backend
      - ../configs:/app/configs
      - ../reconstruction:/app/reconstruction
    networks:
      - 3d-recon-network
    depends_on:
      - redis
      - minio
    command: celery -A backend.workers.celery_app worker --loglevel=info

  # Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: 3d-recon-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ../frontend/src:/app/src
    networks:
      - 3d-recon-network
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

networks:
  3d-recon-network:
    driver: bridge

volumes:
  minio-data:
  mongodb-data:
  redis-data:
