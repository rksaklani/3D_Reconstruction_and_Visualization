# Gaussian Splatting Configuration
# 3D Gaussian representation and training parameters

model:
  sh_degree: 3  # Spherical harmonics degree (0-3)
  source_path: ""  # Will be set dynamically
  model_path: ""  # Will be set dynamically
  images: "images"
  resolution: -1  # -1 for original resolution
  white_background: false
  data_device: "cuda"
  eval: false

optimization:
  iterations: 30000
  position_lr_init: 0.00016
  position_lr_final: 0.0000016
  position_lr_delay_mult: 0.01
  position_lr_max_steps: 30000
  
  feature_lr: 0.0025
  opacity_lr: 0.05
  scaling_lr: 0.005
  rotation_lr: 0.001
  
  percent_dense: 0.01
  lambda_dssim: 0.2
  densification_interval: 100
  opacity_reset_interval: 3000
  densify_from_iter: 500
  densify_until_iter: 15000
  densify_grad_threshold: 0.0002
  
  # Pruning
  prune_from_iter: 500
  prune_until_iter: 15000
  prune_interval: 100
  opacity_cull_threshold: 0.005
  size_threshold: 20  # Max Gaussian size in pixels

rendering:
  # Rasterization settings
  compute_cov3D_python: false
  convert_SHs_python: false
  debug: false
  
  # Anti-aliasing
  antialiasing: true
  
  # Depth rendering
  render_depth: true
  depth_ratio: 1.0

training:
  test_iterations: [7000, 30000]
  save_iterations: [7000, 30000]
  checkpoint_iterations: [7000, 15000, 30000]
  quiet: false
  
  # Data loading
  random_background: false
  
  # Validation
  eval_split: 0.1  # 10% for validation

dynamic:
  # Dynamic Gaussian parameters
  enable: false
  time_steps: 100
  velocity_lr: 0.001
  acceleration_lr: 0.0001
  deformation_lr: 0.001
  
  # Temporal consistency
  temporal_smoothness_weight: 0.1
  motion_prior_weight: 0.05

export:
  # Export settings
  ply_format: "binary"  # binary or ascii
  include_normals: true
  include_colors: true
  include_opacity: true
  include_scale: true
  include_rotation: true
  
  # Mesh conversion
  mesh_resolution: 512
  mesh_threshold: 0.01
  mesh_decimate_target: 100000  # Target triangle count

gpu:
  device: "cuda:0"
  allow_tf32: true
  cudnn_benchmark: true
  num_workers: 4
