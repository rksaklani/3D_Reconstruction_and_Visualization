# Pipeline Configuration

preprocessing:
  target_resolution: [1920, 1080]  # null for no resizing
  normalize_exposure: true
  remove_blurry: true
  blur_threshold: 0.1
  video_sampling_rate: 10  # Extract every Nth frame

sfm:
  feature_detector: "SIFT"  # SIFT, AKAZE, ORB
  min_features_per_image: 100
  matching_threshold: 0.8  # Lowe's ratio test
  matcher_type: "sequential"  # sequential, exhaustive, vocab_tree
  overlap: 20
  loop_detection: false
  vocab_tree_path: null

bundle_adjustment:
  max_iterations: 100
  function_tolerance: 1.0e-6
  gradient_tolerance: 1.0e-10
  parameter_tolerance: 1.0e-8
  num_threads: 8
  reprojection_error_threshold: 2.0

gaussian_training:
  iterations: 30000
  learning_rate: 0.01
  position_learning_rate: 0.00016
  scale_learning_rate: 0.005
  densification_interval: 100
  pruning_interval: 100
  opacity_threshold: 0.005
  checkpoint_interval: 5000

physics:
  gravity: [0.0, -9.81, 0.0]
  time_step: 0.016  # 60 Hz
  collision_iterations: 10
  enable_debug: false

rendering:
  quality: "high"  # low, medium, high
  max_fps: 60
  enable_physics: true
  enable_gaussian_splatting: true
  enable_mesh_rendering: true
  physics_debug_mode: false
