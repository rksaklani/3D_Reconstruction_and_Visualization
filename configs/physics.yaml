# Physics Engine Configuration
# PyBullet physics simulation parameters

engine:
  backend: "pybullet"  # pybullet, mujoco (future)
  gui: false
  real_time: false
  time_step: 0.01  # 100 Hz
  num_solver_iterations: 50
  
gravity:
  x: 0.0
  y: 0.0
  z: -9.81

simulation:
  max_steps: 1000
  substeps: 1
  enable_cone_friction: true
  deterministic_overlapping_pairs: true
  
  # Collision detection
  collision_filter_mode: 1
  enable_sat: false
  enable_file_caching: true
  
  # Contact parameters
  contact_breaking_threshold: 0.001
  contact_slop: 0.0
  enable_sleeping: true
  sleep_threshold_linear: 0.01
  sleep_threshold_angular: 0.01

objects:
  # Default object properties
  default_mass: 1.0
  default_friction: 0.5
  default_restitution: 0.3
  default_linear_damping: 0.04
  default_angular_damping: 0.04
  
  # Dynamic vs static classification
  static_threshold:
    velocity: 0.01  # m/s
    angular_velocity: 0.01  # rad/s
    duration: 1.0  # seconds
  
  # Object categories
  categories:
    rigid:
      mass_range: [0.1, 100.0]
      friction: 0.5
      restitution: 0.3
    
    soft:
      enable: false  # Soft body physics (future)
      stiffness: 1000.0
      damping: 0.1
    
    fluid:
      enable: false  # Fluid simulation (future)
      viscosity: 0.001

constraints:
  # Joint constraints
  enable_joints: true
  joint_damping: 0.1
  joint_friction: 0.0
  
  # Constraint solver
  erp: 0.2  # Error reduction parameter
  contact_erp: 0.2
  friction_erp: 0.2
  
  # Split impulse
  split_impulse: true
  split_impulse_penetration_threshold: -0.04

validation:
  # Physics validation
  check_penetration: true
  max_penetration_depth: 0.01
  check_stability: true
  stability_threshold: 0.1
  
  # Plausibility checks
  max_velocity: 50.0  # m/s
  max_angular_velocity: 100.0  # rad/s
  max_acceleration: 100.0  # m/s²

optimization:
  # Physics-based optimization
  enable: true
  max_iterations: 100
  convergence_threshold: 0.001
  
  # Trajectory optimization
  trajectory_smoothness_weight: 0.1
  physics_consistency_weight: 1.0
  observation_weight: 1.0

export:
  # Export physics data
  save_trajectories: true
  save_contacts: true
  save_forces: false
  trajectory_format: "json"  # json, csv, npz
  
  # Visualization
  visualize_contacts: false
  visualize_forces: false
  visualize_trajectories: true

debug:
  verbose: false
  log_collisions: false
  log_constraints: false
  visualize_aabb: false
  visualize_wireframe: false
