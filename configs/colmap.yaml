# COLMAP Configuration
# Structure-from-Motion parameters

feature_extraction:
  camera_model: "OPENCV"  # SIMPLE_PINHOLE, PINHOLE, SIMPLE_RADIAL, RADIAL, OPENCV, OPENCV_FISHEYE
  single_camera: false
  gpu_index: "0"
  
  # Feature detector
  sift:
    max_num_features: 8192
    first_octave: -1
    num_octaves: 4
    octave_resolution: 3
    peak_threshold: 0.0066667
    edge_threshold: 10.0
    max_num_orientations: 2
    upright: false

feature_matching:
  gpu_index: "0"
  max_num_matches: 32768
  max_distance: 0.7
  cross_check: true
  max_error: 4.0
  confidence: 0.999
  min_num_inliers: 15
  multiple_models: false
  guided_matching: false

mapper:
  min_num_matches: 15
  ignore_watermarks: false
  multiple_models: false
  max_num_models: 50
  max_model_overlap: 20
  min_model_size: 10
  
  # Initialization
  init_min_num_inliers: 100
  init_max_error: 4.0
  init_max_forward_motion: 0.95
  init_min_tri_angle: 16.0
  
  # Triangulation
  abs_pose_max_error: 12.0
  abs_pose_min_num_inliers: 30
  abs_pose_min_inlier_ratio: 0.25
  filter_max_reproj_error: 4.0
  filter_min_tri_angle: 1.5
  
  # Bundle adjustment
  ba_refine_focal_length: true
  ba_refine_principal_point: false
  ba_refine_extra_params: true
  ba_local_num_images: 6
  ba_local_max_num_iterations: 25
  ba_global_max_num_iterations: 50
  ba_global_images_ratio: 1.1
  ba_global_points_ratio: 1.1
  ba_global_max_refinements: 5

dense_reconstruction:
  # Stereo
  max_image_size: 2000
  gpu_index: "0"
  window_radius: 5
  window_step: 1
  sigma_spatial: 3.0
  sigma_color: 0.3
  num_samples: 15
  ncc_sigma: 0.6
  min_triangulation_angle: 1.0
  incident_angle_sigma: 0.9
  num_iterations: 5
  geom_consistency: true
  geom_consistency_regularizer: 0.3
  geom_consistency_max_cost: 3.0
  filter: true
  filter_min_ncc: 0.1
  filter_min_triangulation_angle: 3.0
  filter_min_num_consistent: 3
  filter_geom_consistency_max_cost: 1.0
  
  # Fusion
  check_num_images: 50
  max_reproj_error: 2.0
  max_depth_error: 0.01
  max_normal_error: 10.0
  min_num_pixels: 5
  max_num_pixels: 10000

output:
  sparse_model_path: "sparse/0"
  dense_model_path: "dense/0"
  export_format: "BIN"  # BIN, TXT, NVM, Bundler, VRML, PLY
